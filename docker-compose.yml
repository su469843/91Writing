version: '3.8'

services:
  mo-zhang:
    image: ghcr.io/su469843/91writing:latest
    container_name: mo-zhang
    ports:
      - "8080:80"
    volumes:
      # 持久化小说数据到本地
      - ./data/novels:/app/data/novels
      # 持久化用户配置
      - ./data/config:/app/data/config
    environment:
      - TZ=Asia/Shanghai
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  novels:
    driver: local
  config:
    driver: local
