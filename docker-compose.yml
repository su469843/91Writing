version: '3.8'

services:
  mo-zhang:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: mo-zhang
    ports:
      - "3000:3000"
    volumes:
      # 持久化数据库到本地
      - ./data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATA_DIR=/app/data
      - JWT_SECRET=${JWT_SECRET:-your-secret-key-change-in-production}
      - TZ=Asia/Shanghai
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
